<style>
:root{
  --bg:#080b12; --card:#0f1420; --card2:#161d2e; --border:#1e2a40;
  --text:#dde6f8; --muted:#4a5570;
  --accent:#f5c842; --rgb:245,200,66;
}

/* ── LIGHT MODE ── */
body.light-mode{
  --bg:#fffdf0; --card:#ffffff; --card2:#fdf6d8; --border:#e8dda0;
  --text:#1a1500; --muted:#8a7a30;
  --accent:#c49a00; --rgb:196,154,0;
}
body.light-mode .bandeau{background:rgba(255,253,240,.93);}
body.light-mode .cours-content p,
body.light-mode .cours-content ul,
body.light-mode .cours-content ol,
body.light-mode .cours-content li{color:#2a2000;}
body.light-mode .cours-content blockquote{color:#2a2000;}

/* ── BOUTON THEME ── */
#theme-toggle{
  position:fixed;bottom:22px;left:22px;z-index:9999;
  width:46px;height:46px;border-radius:50%;
  border:1px solid rgba(var(--rgb),.35);
  background:var(--card);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  color:var(--text);font-size:1.2rem;
  transition:transform .2s,box-shadow .2s,background .3s;
}
#theme-toggle:hover{transform:scale(1.12);box-shadow:0 6px 24px rgba(0,0,0,.35);}

/* ── BOUTON COPIER ── */
.copy-bar{display:flex;justify-content:flex-end;margin-bottom:10px;}
.btn-copy{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:20px;
  border:1px solid rgba(var(--rgb),.35);
  background:rgba(var(--rgb),.1);
  color:var(--accent);font-size:.72rem;font-weight:700;
  cursor:pointer;font-family:'Sora',sans-serif;
  transition:background .2s,transform .15s;
}
.btn-copy:hover{background:rgba(var(--rgb),.2);transform:scale(1.04);}
.btn-copy.ok{color:#3ecf8e;border-color:#3ecf8e;background:rgba(62,207,142,.1);}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;}

/* ── BANDEAU STICKY ── */
.bandeau{
  position:sticky;top:0;z-index:100;
  background:rgba(8,11,18,.92);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:10px 20px;
}
.bandeau::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),transparent);opacity:.6;
}
.bandeau-inner{
  max-width:900px;margin:0 auto;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
  background:rgba(var(--rgb),.1);border:1px solid rgba(var(--rgb),.3);
  border-radius:8px;color:var(--accent);text-decoration:none;
  font-size:.75rem;font-weight:700;transition:all .15s;flex-shrink:0;
  font-family:'Sora',sans-serif;
}
.back-btn:hover{background:rgba(var(--rgb),.2);}
.bandeau-right{display:flex;align-items:center;gap:14px;margin-left:auto;flex-wrap:wrap;}
.clock{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700;letter-spacing:2px;}
.date-info{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.date-jour{font-size:.78rem;font-weight:700;}
.date-complet{font-size:.6rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.sem-bloc{display:flex;flex-direction:column;align-items:center;gap:1px;}
.sem-lab{font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.sem-b{font-size:1.1rem;font-weight:800;padding:3px 11px;border-radius:7px;font-family:'JetBrains Mono',monospace;line-height:1;}
.sem-n{font-size:.5rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}

/* ── HERO MATIÈRE ── */
.hero{
  padding:32px 20px 28px;position:relative;overflow:hidden;
  border-bottom:1px solid var(--border);
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 120% at 50% -10%,rgba(var(--rgb),.1),transparent 70%);
}
.hero-inner{max-width:900px;margin:0 auto;position:relative;}
.hero-top{
  font-size:.6rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(var(--rgb),.7);font-family:'JetBrains Mono',monospace;margin-bottom:16px;
}
.hero-row{display:flex;align-items:center;gap:20px;}
.hero-emoji{
  font-size:4rem;line-height:1;flex-shrink:0;
  filter:drop-shadow(0 0 24px rgba(var(--rgb),.5));
}
.hero-nom-wrap{}
.hero-niveau{
  display:inline-block;font-size:.65rem;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--accent);font-family:'JetBrains Mono',monospace;
  background:rgba(var(--rgb),.12);border:1px solid rgba(var(--rgb),.3);
  padding:3px 10px;border-radius:20px;margin-bottom:8px;
}
.hero-nom{
  font-size:clamp(2rem,6vw,3rem);font-weight:800;letter-spacing:-2px;
  color:var(--accent);line-height:1;
  text-shadow:0 0 60px rgba(var(--rgb),.4);
}
.hero-desc{font-size:.82rem;color:var(--muted);margin-top:6px;}

/* ── CONTENU ── */
main{max-width:900px;margin:0 auto;padding:28px 20px 80px;}

.section-lbl{
  font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);margin:0 0 16px;
  display:flex;align-items:center;gap:10px;
}
.section-lbl::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── CARTES SÉQUENCES ── */
.seq-list{display:flex;flex-direction:column;gap:10px;}

.seq-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:16px 18px;cursor:pointer;
  display:flex;align-items:center;gap:14px;transition:all .2s;
}
.seq-card:hover{
  border-color:var(--accent);
  background:var(--card2);
  transform:translateX(5px);
  box-shadow:0 6px 28px rgba(var(--rgb),.15);
}
.seq-num{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:rgba(var(--rgb),.1);border:1px solid rgba(var(--rgb),.35);
  color:var(--accent);display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;
}
.seq-info{flex:1;min-width:0;}
.seq-titre{font-size:.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.seq-sous{font-size:.7rem;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.seq-arrow{
  color:var(--muted);font-size:.9rem;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;transition:all .2s;flex-shrink:0;
}
.seq-card:hover .seq-arrow{color:var(--accent);background:rgba(var(--rgb),.12);}

/* ── PAGE COURS ── */
.cours-back{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;background:var(--card2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:.8rem;font-weight:600;
  cursor:pointer;margin-bottom:22px;transition:all .15s;font-family:'Sora',sans-serif;
}
.cours-back:hover{background:var(--border);}
.cours-titre{font-size:1.5rem;font-weight:800;letter-spacing:-.8px;margin-bottom:6px;}
.cours-meta{
  font-size:.7rem;color:var(--muted);font-family:'JetBrains Mono',monospace;
  margin-bottom:24px;padding-left:14px;border-left:3px solid var(--accent);
}
.cours-content{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:28px;line-height:1.9;font-size:.9rem;
  border-top:3px solid var(--accent);
}
.cours-content h2{font-size:1.05rem;font-weight:800;margin:26px 0 10px;color:var(--accent);letter-spacing:-.2px;}
.cours-content h2:first-child{margin-top:0;}
.cours-content h3{font-size:.92rem;font-weight:700;margin:18px 0 7px;color:var(--text);}
.cours-content p{margin-bottom:12px;color:#bbc8e0;}
.cours-content ul,
.cours-content ol{margin:0 0 14px 22px;color:#bbc8e0;}
.cours-content li{margin-bottom:5px;line-height:1.6;}
.cours-content strong{color:var(--text);}
.cours-content em{color:var(--accent);font-style:normal;font-weight:600;}
.cours-content hr{border:none;border-top:1px solid var(--border);margin:22px 0;}
.cours-content blockquote{
  border-left:3px solid var(--accent);padding:10px 16px;
  background:rgba(var(--rgb),.06);border-radius:0 8px 8px 0;
  margin:14px 0;color:#bbc8e0;font-style:italic;

/* ── PAGES ── */
.page{display:none;}
.page.active{display:block;animation:pageIn .3s ease;}
@keyframes pageIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.stagger>*{animation:fadeUp .35s both;}
.stagger>*:nth-child(1){animation-delay:.03s;}.stagger>*:nth-child(2){animation-delay:.07s;}
.stagger>*:nth-child(3){animation-delay:.11s;}.stagger>*:nth-child(4){animation-delay:.15s;}
.stagger>*:nth-child(5){animation-delay:.19s;}.stagger>*:nth-child(6){animation-delay:.23s;}
.stagger>*:nth-child(7){animation-delay:.27s;}.stagger>*:nth-child(8){animation-delay:.31s;}
.stagger>*:nth-child(9){animation-delay:.35s;}.stagger>*:nth-child(10){animation-delay:.39s;}

.footer{
  text-align:center;padding:18px;font-size:.65rem;color:var(--muted);
  font-family:'JetBrains Mono',monospace;border-top:1px solid var(--border);margin-top:20px;
}

@media(max-width:600px){
  .hero-nom{font-size:2rem;}
  .bandeau-right{margin-left:0;}
  .date-info{align-items:flex-start;}
}
</style>

<p>
<h1><u>Démographie, inégalités et développement</h1></u>

<h2>THÈME 2 : Territoires, populations, développement ; quels défis ?</h2>

<h3>DÉFINITIONS</h3>

<p><strong>démographie :</strong> étude des populations</p>

<p><strong>inégalités :</strong> différences dans l'accès aux ressources, pratiques, biens ou services. Elles peuvent être économiques, sociales ou politiques.</p>

<p><strong>développement :</strong> amélioration des conditions et de la qualité de vie des gens.</p>

<h3>I) Des trajectoires démographiques différenciées</h3>

<h4>1. Modèle théorique : transition démographique</h4>

<p>(Schéma avec courbes de natalité en bleu et mortalité en rouge)</p>

<p>Phase 1</p>
<p>Phase 2</p>
<p>Phase 3</p>
<p>Phase 4</p>

<p>Quel que soit les pays, ils obéissent toujours aux mécanismes de la transition démographique :</p>

<p><strong>Phase 1 :</strong> la natalité et la mortalité sont élevées, les conditions de vie étant difficiles (famines, guerres).</p>

<p><strong>Phase 2 :</strong> grâce aux progrès de l’agriculture et de la médecine, la mortalité s'effondre mais la natalité se maintient, les populations conservant leurs anciennes pratiques de fécondité. La population augmente fortement.</p>

<p>exemple : Madagascar, Mauritanie.</p>

<p><strong>Phase 3 :</strong> la natalité rejoint la mortalité à un faible niveau, la population stagne.</p>

<p>exemple : Maroc, Libye.</p>

<p><strong>Phase 4 :</strong> la natalité continue de baisser jusqu'à être inférieure à la mortalité, la population diminue.</p>

<p>exemple : France, Italie.</p>

<h4>2. Une situation mondiale contrastée</h4>

<p>La fécondité des pays du Nord est plus faible que celle des pays du Sud (ex : ~1,2 enfant par femme en Italie contre 4 au Mali). Mais certains pays du Sud ont une fécondité comparable à celle du Nord comme au Brésil.</p>

<p>Le continent qui connaît la fécondité la plus basse est l'Europe et celui avec la fécondité la plus haute est l'Afrique.</p>

<p>Le continent le plus concerné par le vieillissement est l'Europe (âge médian en France : 40 ans). Le continent le plus jeune est l'Afrique (âge médian au Tchad : 20 ans).</p>

<p>Le continent qui sera le plus peuplé en 2030 sera l'Asie mais c'est l'Afrique qui connaîtra la plus forte croissance.</p>

<h4>3. Les enjeux du vieillissement au Japon</h4>

<p>Le Japon est un "laboratoire du vieillissement" en raison de sa situation particulière où les plus de 65 ans représentent déjà plus du quart de la population, ce qui en fait le pays le plus vieux du monde.</p>

<p>Il doit donc trouver des solutions pour lutter contre la pénurie de main-d'œuvre, comme le travail des personnes âgées, les innovations technologiques et l'immigration.</p>

<p>Mais c'est aussi un laboratoire car il préfigure ce qui attend de nombreux pays, notamment les pays du Nord.</p>

<h3>II) Développement et inégalités</h3>

<h4>1. Des liens complexes</h4>

<p><strong>Un développement qui progresse :</strong> le développement n'est pas uniquement une question de richesses, il comprend aussi les conditions de vie. Depuis 30 ans, le développement a progressé partout dans le monde.</p>

<p>On utilise l'IDH pour le calculer, chiffre entre 0 et 1. L'IDH du monde a augmenté de 0,6 à 0,75 (1990 - 2023).</p>

<p><strong>richesse :</strong> 1 milliard de personnes est sorti de la pauvreté</p>

<p><strong>éducation :</strong> 80% vont à l'école primaire.</p>

<p>Afrique subsaharienne : IDH = 0,57</p>

<p>Asie du Sud a progressé : 0,67 (en 2023) contre 0,4 en 1990.</p>

<p>Amérique latine : 0,78 → sorties de pauvreté</p>

<p>Depuis le COVID, l'IDH ne progresse plus, l'écart entre pays riches et pauvres s'agrandit.</p>

<p><strong>Des inégalités qui s'accroissent.</strong> On peut regrouper les pays en trois :</p>

<ul>
<li><strong>les pays riches :</strong> tournés vers l'économie verte (- pollution) mais les inégalités augmentent beaucoup.<br>
ex : 1% des plus riches des USA détenaient 10% du PIB en 1990 contre 26% maintenant.</li>

<li><strong>les pays émergents :</strong> se sont beaucoup développés en se spécialisant dans un domaine.<br>
ex : Chine → industrie, Brésil → agriculture. Cependant, il y a beaucoup d'inégalités entre régions.<br>
ex : Chine : littoral riche, intérieur pauvre.</li>

<li><strong>les PMA :</strong> ont du mal à sortir de la pauvreté, avec les femmes comme principales victimes ainsi que les ruraux.</li>
</ul>

<h4>2. Un exemple : inégalités face à l'éducation</h4>

<p>La situation démographique est donc très contrastée avec des régions de faibles (Europe) et de fortes (Afrique) fécondités.</p>

<p>Au niveau du développement, on assiste à une réduction de la pauvreté même si les inégalités s'accroissent.</p>

  <li>Le Roi \u00e9tend son emprise sur le territoire par une activit\u00e9 l\u00e9gislative accrue (grandes ordonnances comme celle de Villers-Cotter\u00eats en 1539) et l'accroissement du nombre d'officiers le repr\u00e9sentant dans les provinces. D\u00e9sormais, servir le prince et servir l'\u00c9tat est indissociable.</li>
  <li>Il est cependant excessif de parler d'absolutisme, car le Roi recherche le plus souvent la collaboration des Parlements et des \u00e9lites urbaines. Il est aussi d\u00e9pendant de l'influence des seigneurs pour compenser un nombre d'officiers (5000) insufisant pour administrer un si vaste Royaume.
  <li>Un exemple nous est fourni par l'ordonnance de Villiers-Cotterets.
L'article III indique que “à cause de la mauvaise compréhension des mots latin, dorénavant tous les arrêts ainsi que toutes les autres procédures soit publier en langue maternelle française et pas autrement.”</p>

<p><strong>3. Par l'économie</strong></p>


  <li>Le mercantilisme :
C'est une théorie économique > la puissance de l'État est fait par la possession en quantité d'or et d'argent. Pour augmenter il faut que les exportations doivent être supérieures aux importations. Colbert, ministre de Louis XIV, crée les produits de luxe dans les manufactures dans lequels sont regroupés les artisans pour fabriquer des produits de luxe. Manufacture des Gobelins, Paris, meubles.
</li>
  <li>Le commerce maritime. 
La France possède des colonies (Canada, Saint-Domingue) et possède des comptoirs (Afrique, Sénégal, Inde). Pour mettre en valeur ces colonies, Colbert va créer des compagnies. Compagnie des Indes Occidentales. La France va exporter des produits vers ses colonies (armes, luxe), en échange on importe (sucre, épices). Les colonies Américaine> esclaves.
</li>
  <li>Un bilan négatif
Les compagnies de Colbert sont concurrencés par l'Angleterre, la Hollande… La Compagnie des Indes Occidentales durera 10 ans et s'éteindra.
Les dépenses de Louis XIV Versailles, guerres… entraînent cette chute.
</li></p>

// ── Horloge ────────────────────────────────────────────────
function getSem(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - y) / 86400000) + 1) / 7);
}

function tick() {
  const d = new Date();
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const mois  = ['janvier','février','mars','avril','mai','juin','juillet','août',
                  'septembre','octobre','novembre','décembre'];
  document.getElementById('jour').textContent = jours[d.getDay()];
  document.getElementById('date-complet').textContent =
    d.getDate() + ' ' + mois[d.getMonth()] + ' ' + d.getFullYear();
  const n = getSem(d);
  // Référence : semaine 15 (6–12 avril 2026) = B (impaire=B, paire=A)
  const s = n % 2 === 1 ? 'B' : 'A';
  const b = document.getElementById('sem-b');
  document.getElementById('sem-n').textContent = 'n°' + n;
  b.textContent = s;
  b.style.background = s === 'A' ? 'rgba(79,142,247,.2)' : 'rgba(62,207,142,.2)';
  b.style.color       = s === 'A' ? '#4f8ef7'             : '#3ecf8e';
}

// ── Rendu liste ────────────────────────────────────────────
function render() {
  const c = document.getElementById('seq-list');
  c.innerHTML = '';
  SEQUENCES.forEach((seq, si) => {
    seq.parties.forEach((p, pi) => {
      const div = document.createElement('div');
      div.className = 'seq-card';
      div.innerHTML = `
        <div class="seq-num">${si+1}.${pi+1}</div>
        <div class="seq-info">
          <div class="seq-titre">${p.titre}</div>
          <div class="seq-sous">${seq.titre}</div>
        </div>
        <div class="seq-arrow">→</div>`;
      div.onclick = () => ouvrir(si, pi);
      c.appendChild(div);
    });
  });
  c.classList.remove('stagger');
  void c.offsetWidth;
  c.classList.add('stagger');
}

function ouvrir(si, pi) {
  const seq = SEQUENCES[si], p = seq.parties[pi];
  document.getElementById('cours-titre').textContent = p.titre;
  document.getElementById('cours-meta').textContent  = '🌍 Histoire-Géographie · ' + seq.titre;
  document.getElementById('cours-contenu').innerHTML = p.contenu;

  // ── Bouton COPIER ──
  const copyBar = document.createElement('div');
  copyBar.className = 'copy-bar';
  copyBar.innerHTML = `<button class="btn-copy" onclick="copierCours(this)">
    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <rect x="9" y="9" width="13" height="13" rx="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>
    Copier le cours
  </button>`;
  const contenuEl = document.getElementById('cours-contenu');
  contenuEl.insertBefore(copyBar, contenuEl.firstChild);

  document.getElementById('page-liste').classList.remove('active');
  document.getElementById('page-cours').classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function copierCours(btn) {
  const contenuEl = document.getElementById('cours-contenu');
  const copyBar = contenuEl.querySelector('.copy-bar');
  copyBar.style.display = 'none';
  const texte = contenuEl.innerText;
  copyBar.style.display = '';
  navigator.clipboard.writeText(texte).then(() => {
    btn.innerHTML = '✓ Copié !';
    btn.classList.add('ok');
    setTimeout(() => {
      btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copier le cours`;
      btn.classList.remove('ok');
    }, 2200);
  });
}

function retour() {
  document.getElementById('page-cours').classList.remove('active');
  document.getElementById('page-liste').classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

document.addEventListener('DOMContentLoaded', () => {
  tick();
  setInterval(tick, 10000);
  render();

  // ── Dark / Light mode ──
  const toggleBtn = document.getElementById('theme-toggle');
  if (localStorage.getItem('theme-hg') === 'light') {
    document.body.classList.add('light-mode');
    toggleBtn.textContent = '☀️';
  }
  toggleBtn.addEventListener('click', () => {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    toggleBtn.textContent = isLight ? '☀️' : '🌙';
    localStorage.setItem('theme-hg', isLight ? 'light' : 'dark');
  });
});
